app = "gleaming-reed-003"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  # Headless chromium (used by fetch_reference) needs headroom on top of the
  # Go binary; 512mb OOMs reliably during page renders.
