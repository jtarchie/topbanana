version: '3'

vars:
  MINIO_DATA_DIR: /tmp/topbanana-minio
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_USER: minioadmin
  MINIO_PASS: minioadmin
  MINIO_BUCKET: topbanana
  LMSTUDIO_BASE_URL: http://localhost:1234/v1
  LMSTUDIO_MODEL: lmstudio/google/gemma-4-26b-a4b
  LLM_E2E_MODEL: lmstudio/google/gemma-4-12b
  LLM_E2E_MODEL_NAME: google/gemma-4-12b
  LLM_E2E_CONTEXT: 16384
  SUPER_ADMIN_EMAIL: admin@local
  COVERAGE_FILE: coverage.out
  BENCHSTAT_DIR: .benchstats
  FUZZ_TIME: 30s
  ALLOWED_LICENSES: MIT,MIT-0,Apache-2.0,BSD-3-Clause,BSD-2-Clause,ISC,MPL-2.0

tasks:
  fmt:
    cmds:
      - gofmt -w .
      - golangci-lint run ./... --fix
      - go test -race ./...

  vuln:
    desc: Scan the module for known Go vulnerabilities (uses the Go vuln DB; reports only symbols actually reachable from the build).
    cmds:
      - govulncheck ./...

  sec:
    desc: Run gosec standalone as a second-pass SAST over the Go source. golangci-lint already wraps gosec with per-site //nolint markers; this run catches drift on rules that aren't site-justified.
    cmds:
      # Standalone gosec doesn't honor //nolint:gosec comments (it uses
      # #nosec instead), so we exclude the rules that have approved per-site
      # //nolint markers in golangci-lint:
      #   G104, G301, G304, G306 — already excluded in .golangci.yml.
      #   G203 — manage.go/proxy.go/workspace.go HTML escapes are vetted.
      #   G204 — css_compile.go subprocess uses an operator-resolved CLI path.
      #   G404 — slug_gen.go uses math/rand for public URL words, not tokens.
      # -tests=false skips test files (G115/G124 there are test-only patterns).
      - gosec -quiet -exclude-generated -tests=false -exclude=G104,G203,G204,G301,G304,G306,G404 ./...

  licenses:
    desc: Verify every Go dependency carries an allow-listed license. Update ALLOWED_LICENSES in the Taskfile vars if a new permissive license needs to be added.
    cmds:
      # --ignore github.com/jtarchie/topbanana skips classifier complaints
      # about the project's own internal/* packages (no LICENSE at the repo
      # root is intentional). github.com/segmentio/asm ships an MIT-No-
      # Attribution (MIT-0) license that go-licenses' classifier can't name —
      # the license is strictly more permissive than MIT, so we ignore it.
      - >
        go-licenses check ./...
        --allowed_licenses={{.ALLOWED_LICENSES}}
        --ignore github.com/jtarchie/topbanana
        --ignore github.com/segmentio/asm

  nilaway:
    desc: Run Uber's nilaway nil-pointer analyzer on production code. -exclude-test-files skips the test_file http.NewRequest pattern (FP). Advisory — never gates `task quality`.
    cmds:
      - nilaway -exclude-test-files=true ./... || true

  tidy:
    desc: Verify that `go mod tidy` would be a no-op and that all module sums verify.
    cmds:
      # `go mod tidy -diff` (Go 1.23+) prints the changes tidy would make
      # and exits non-zero if any are needed — gates without touching the
      # working tree the way `git diff` would.
      - go mod tidy -diff
      - go mod verify

  test:cover:
    desc: Run the full test suite with coverage and open the HTML report.
    cmds:
      - go test -coverprofile={{.COVERAGE_FILE}} -covermode=atomic ./...
      - go tool cover -html={{.COVERAGE_FILE}}

  test:cover:summary:
    desc: Print the total covered-statement percentage to stdout (uses the most recent coverage.out — run `task test:cover` first if it's missing).
    cmds:
      - |
        if [ ! -f {{.COVERAGE_FILE}} ]; then
          go test -coverprofile={{.COVERAGE_FILE}} -covermode=atomic ./...
        fi
        go tool cover -func={{.COVERAGE_FILE}} | tail -1

  bench:
    desc: Run every Go benchmark in the repo with -benchmem and -count=5 so benchstat has enough samples to detect real changes.
    cmds:
      - go test -run='^$' -bench=. -benchmem -count=5 ./...

  bench:save:
    desc: Snapshot the current bench output into {{.BENCHSTAT_DIR}}/bench-<git-sha>.txt for later `task bench:diff` comparisons.
    cmds:
      - mkdir -p {{.BENCHSTAT_DIR}}
      - |
        sha="$(git rev-parse --short HEAD 2>/dev/null || echo wip)"
        go test -run='^$' -bench=. -benchmem -count=5 ./... \
          | tee "{{.BENCHSTAT_DIR}}/bench-${sha}.txt"

  bench:diff:
    desc: 'Compare two saved bench snapshots with benchstat. Usage: task bench:diff -- <old.txt> <new.txt>'
    cmds:
      - benchstat {{.CLI_ARGS}}

  fuzz:
    desc: Run the high-signal fuzz targets (path traversal, subdomain parsing, HTML lint) for {{.FUZZ_TIME}} each. Crashers land under testdata/fuzz/.
    cmds:
      - go test -run='^$' -fuzz=FuzzClassifyUserPath -fuzztime={{.FUZZ_TIME}} ./internal/server/
      - go test -run='^$' -fuzz=FuzzStripPort         -fuzztime={{.FUZZ_TIME}} ./internal/server/
      - go test -run='^$' -fuzz=FuzzValidateSlug      -fuzztime={{.FUZZ_TIME}} ./internal/server/
      - go test -run='^$' -fuzz=FuzzIsTraversal       -fuzztime={{.FUZZ_TIME}} ./internal/server/
      - go test -run='^$' -fuzz=FuzzHTMLLint          -fuzztime={{.FUZZ_TIME}} ./internal/lint/

  install:tools:
    desc: Install every Go CLI the quality tasks depend on. Run once after cloning, or whenever you upgrade Go.
    cmds:
      - go install golang.org/x/vuln/cmd/govulncheck@latest
      - go install github.com/securego/gosec/v2/cmd/gosec@latest
      - go install github.com/google/go-licenses@latest
      - go install go.uber.org/nilaway/cmd/nilaway@latest
      - go install golang.org/x/perf/cmd/benchstat@latest

  quality:
    desc: Fast quality pass — fmt + lint + race-tested unit tests, plus vuln/sec/tidy/licenses gates. Intended as the "before I push" command.
    cmds:
      - task: fmt
      - task: tidy
      - task: vuln
      - task: sec
      - task: licenses

  quality:deep:
    desc: Slow quality pass — runs `task quality` then exercises the benchmark suite, the fuzz targets, and nilaway. Use when touching security-sensitive code paths.
    cmds:
      - task: quality
      - task: bench
      - task: fuzz
      - task: nilaway

  css:
    desc: Recompile the embedded admin-UI stylesheet (internal/assets/app.css) from app.input.css + vendored daisyUI. Run after editing the admin templates or the input CSS.
    dir: internal/assets
    cmds:
      - tailwindcss -i app.input.css -o app.css --minify

  vendor:daisyui:
    desc: Re-vendor the daisyUI npm package into internal/assets/daisyui. After bumping, update DaisyUIVersion in internal/assets/embed.go and rerun `task css`.
    cmds:
      - |
        set -e
        tmp="$(mktemp -d)"
        ( cd "$tmp" && npm pack daisyui@5 >/dev/null && tar xzf daisyui-*.tgz )
        rm -f "$tmp"/package/README.md
        rm -rf internal/assets/daisyui
        mv "$tmp"/package internal/assets/daisyui
        rm -rf "$tmp"
        node -e 'console.log("vendored daisyui", require("./internal/assets/daisyui/package.json").version)'

  vendor:docs:
    desc: Re-vendor the daisyUI llms.txt reference into internal/docs/sources/daisyui.md (searched on demand by the agent's search_docs tool). After running, set DaisyUIDocsVersion in internal/docs/corpus.go to match assets.DaisyUIVersion.
    cmds:
      - |
        set -e
        dest="internal/docs/sources"
        mkdir -p "$dest"
        curl -fsSL https://daisyui.com/llms.txt -o "$dest/daisyui.md"
        # Pin the docs freshness to the vendored daisyUI CSS version so the
        # searchable reference and the compiled component classes never describe
        # different releases (docs_test.go asserts both match).
        ver="$(node -e 'console.log(require("./internal/assets/daisyui/package.json").version)')"
        printf '{\n  "daisyui": "%s"\n}\n' "$ver" > "$dest/VERSIONS.json"
        echo "vendored daisyui llms.txt at daisyui $ver (set DaisyUIDocsVersion in internal/docs/corpus.go)"
      # OPTIONAL second corpus — Tailwind. There is no official single-file
      # Tailwind LLM doc (the upstream /llms.txt PR was closed), so adding it is
      # a deliberate, licensing-reviewed step: drop internal/docs/sources/
      # tailwind.md, add one //go:embed var + one sources entry in corpus.go.

  local:
    desc: Run the app locally using LM Studio and Minio
    deps: [minio:ready]
    env:
      AWS_ACCESS_KEY_ID: "{{.MINIO_USER}}"
      AWS_SECRET_ACCESS_KEY: "{{.MINIO_PASS}}"
      AWS_REGION: us-east-1
    cmds:
      - |
        go run ./cmd/topbanana \
          --s3-bucket {{.MINIO_BUCKET}} \
          --s3-endpoint-url {{.MINIO_ENDPOINT}} \
          --llm-model {{.LMSTUDIO_MODEL}} \
          --llm-base-url {{.LMSTUDIO_BASE_URL}} \
          --llm-api-key lm-studio \
          --domain localhost \
          --super-admin-email {{.SUPER_ADMIN_EMAIL}} \
          --mcp-secret dev-mcp-secret-local-only \
          --insecure-cookies \
          --port 8080

  minio:start:
    desc: Start Minio server in the background
    cmds:
      - mkdir -p {{.MINIO_DATA_DIR}}
      - |
        MINIO_ROOT_USER={{.MINIO_USER}} MINIO_ROOT_PASSWORD={{.MINIO_PASS}} \
        minio server {{.MINIO_DATA_DIR}} --address :9000 &
        echo $! > /tmp/topbanana-minio.pid
      - sleep 1

  minio:stop:
    desc: Stop the background Minio server
    cmds:
      - |
        if [ -f /tmp/topbanana-minio.pid ]; then
          kill $(cat /tmp/topbanana-minio.pid) 2>/dev/null || true
          rm /tmp/topbanana-minio.pid
        fi

  minio:ready:
    desc: Ensure Minio is running (the app creates the bucket on startup)
    cmds:
      - |
        if ! curl -sf {{.MINIO_ENDPOINT}}/minio/health/live > /dev/null 2>&1; then
          echo "Starting Minio..."
          mkdir -p {{.MINIO_DATA_DIR}}
          MINIO_ROOT_USER={{.MINIO_USER}} MINIO_ROOT_PASSWORD={{.MINIO_PASS}} \
            minio server {{.MINIO_DATA_DIR}} --address :9000 --quiet \
            > /tmp/topbanana-minio.log 2>&1 &
          echo $! > /tmp/topbanana-minio.pid
          sleep 2
        fi

  lmstudio:ready:
    desc: Ensure LM Studio is reachable and the e2e model is loaded with enough context (for test:llm)
    cmds:
      - |
        if ! curl -sf {{.LMSTUDIO_BASE_URL}}/models > /dev/null 2>&1; then
          echo "LM Studio not reachable at {{.LMSTUDIO_BASE_URL}} — run 'lms server start' first" >&2
          exit 1
        fi
        # The build agent's system prompt is ~4-7K tokens; LM Studio's default
        # 4096 context starves it (no room left to call write_file). Load with a
        # generous context. Reloads only if not already loaded at this context.
        if ! lms ps 2>/dev/null | grep -q "{{.LLM_E2E_MODEL_NAME}}.*{{.LLM_E2E_CONTEXT}}"; then
          lms load {{.LLM_E2E_MODEL_NAME}} -c {{.LLM_E2E_CONTEXT}} --gpu max -y || true
        fi

  test:llm:
    desc: Run the opt-in real-LLM integration tests (LM Studio + Minio); excluded from the default `go test`/`task fmt` run
    deps: [minio:ready, lmstudio:ready]
    env:
      AWS_ACCESS_KEY_ID: "{{.MINIO_USER}}"
      AWS_SECRET_ACCESS_KEY: "{{.MINIO_PASS}}"
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: "{{.MINIO_ENDPOINT}}"
      S3_BUCKET: "{{.MINIO_BUCKET}}"
      TOPBANANA_LLM_E2E: "1"
      LLM_MODEL: "{{.LLM_E2E_MODEL}}"
      LLM_BASE_URL: "{{.LMSTUDIO_BASE_URL}}"
      LLM_API_KEY: lm-studio
    cmds:
      # Local models are slow: each scenario self-caps at 20m and the build-then-
      # edit case is two runs, so budget generously for all three in sequence.
      - go test -run 'TestLLM_' -timeout 100m -v ./internal/build/
