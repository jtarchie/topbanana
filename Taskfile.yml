version: '3'

vars:
  MINIO_DATA_DIR: /tmp/topbanana-minio
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_USER: minioadmin
  MINIO_PASS: minioadmin
  MINIO_BUCKET: topbanana
  LMSTUDIO_BASE_URL: http://localhost:1234/v1
  LMSTUDIO_MODEL: lmstudio/google/gemma-4-26b-a4b
  LLM_E2E_MODEL: lmstudio/google/gemma-4-12b
  LLM_E2E_MODEL_NAME: google/gemma-4-12b
  LLM_E2E_CONTEXT: 16384
  SUPER_ADMIN_EMAIL: admin@local

tasks:
  fmt:
    cmds:
      - gofmt -w .
      - golangci-lint run ./... --fix
      - go test -race ./...

  css:
    desc: Recompile the embedded admin-UI stylesheet (internal/assets/app.css) from app.input.css + vendored daisyUI. Run after editing the admin templates or the input CSS.
    dir: internal/assets
    cmds:
      - tailwindcss -i app.input.css -o app.css --minify

  vendor:daisyui:
    desc: Re-vendor the daisyUI npm package into internal/assets/daisyui. After bumping, update DaisyUIVersion in internal/assets/embed.go and rerun `task css`.
    cmds:
      - |
        set -e
        tmp="$(mktemp -d)"
        ( cd "$tmp" && npm pack daisyui@5 >/dev/null && tar xzf daisyui-*.tgz )
        rm -f "$tmp"/package/README.md
        rm -rf internal/assets/daisyui
        mv "$tmp"/package internal/assets/daisyui
        rm -rf "$tmp"
        node -e 'console.log("vendored daisyui", require("./internal/assets/daisyui/package.json").version)'

  local:
    desc: Run the app locally using LM Studio and Minio
    deps: [minio:ready]
    env:
      AWS_ACCESS_KEY_ID: "{{.MINIO_USER}}"
      AWS_SECRET_ACCESS_KEY: "{{.MINIO_PASS}}"
      AWS_REGION: us-east-1
    cmds:
      - |
        go run ./cmd/topbanana \
          --s3-bucket {{.MINIO_BUCKET}} \
          --s3-endpoint-url {{.MINIO_ENDPOINT}} \
          --llm-model {{.LMSTUDIO_MODEL}} \
          --llm-base-url {{.LMSTUDIO_BASE_URL}} \
          --llm-api-key lm-studio \
          --domain localhost \
          --super-admin-email {{.SUPER_ADMIN_EMAIL}} \
          --insecure-cookies \
          --port 8080

  minio:start:
    desc: Start Minio server in the background
    cmds:
      - mkdir -p {{.MINIO_DATA_DIR}}
      - |
        MINIO_ROOT_USER={{.MINIO_USER}} MINIO_ROOT_PASSWORD={{.MINIO_PASS}} \
        minio server {{.MINIO_DATA_DIR}} --address :9000 &
        echo $! > /tmp/topbanana-minio.pid
      - sleep 1

  minio:stop:
    desc: Stop the background Minio server
    cmds:
      - |
        if [ -f /tmp/topbanana-minio.pid ]; then
          kill $(cat /tmp/topbanana-minio.pid) 2>/dev/null || true
          rm /tmp/topbanana-minio.pid
        fi

  minio:ready:
    desc: Ensure Minio is running (the app creates the bucket on startup)
    cmds:
      - |
        if ! curl -sf {{.MINIO_ENDPOINT}}/minio/health/live > /dev/null 2>&1; then
          echo "Starting Minio..."
          mkdir -p {{.MINIO_DATA_DIR}}
          MINIO_ROOT_USER={{.MINIO_USER}} MINIO_ROOT_PASSWORD={{.MINIO_PASS}} \
            minio server {{.MINIO_DATA_DIR}} --address :9000 --quiet \
            > /tmp/topbanana-minio.log 2>&1 &
          echo $! > /tmp/topbanana-minio.pid
          sleep 2
        fi

  lmstudio:ready:
    desc: Ensure LM Studio is reachable and the e2e model is loaded with enough context (for test:llm)
    cmds:
      - |
        if ! curl -sf {{.LMSTUDIO_BASE_URL}}/models > /dev/null 2>&1; then
          echo "LM Studio not reachable at {{.LMSTUDIO_BASE_URL}} — run 'lms server start' first" >&2
          exit 1
        fi
        # The build agent's system prompt is ~4-7K tokens; LM Studio's default
        # 4096 context starves it (no room left to call write_file). Load with a
        # generous context. Reloads only if not already loaded at this context.
        if ! lms ps 2>/dev/null | grep -q "{{.LLM_E2E_MODEL_NAME}}.*{{.LLM_E2E_CONTEXT}}"; then
          lms load {{.LLM_E2E_MODEL_NAME}} -c {{.LLM_E2E_CONTEXT}} --gpu max -y || true
        fi

  test:llm:
    desc: Run the opt-in real-LLM integration tests (LM Studio + Minio); excluded from the default `go test`/`task fmt` run
    deps: [minio:ready, lmstudio:ready]
    env:
      AWS_ACCESS_KEY_ID: "{{.MINIO_USER}}"
      AWS_SECRET_ACCESS_KEY: "{{.MINIO_PASS}}"
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: "{{.MINIO_ENDPOINT}}"
      S3_BUCKET: "{{.MINIO_BUCKET}}"
      TOPBANANA_LLM_E2E: "1"
      LLM_MODEL: "{{.LLM_E2E_MODEL}}"
      LLM_BASE_URL: "{{.LMSTUDIO_BASE_URL}}"
      LLM_API_KEY: lm-studio
    cmds:
      # Local models are slow: each scenario self-caps at 20m and the build-then-
      # edit case is two runs, so budget generously for all three in sequence.
      - go test -run 'TestLLM_' -timeout 100m -v ./internal/build/
