<!DOCTYPE html>
<html lang="en" data-theme="lemonade">
<head>
<title>{{ .Status }} — Top Banana</title>
{{ template "head" . }}
</head>
<body class="min-h-screen grid place-items-center bg-base-200 px-4 py-12">
<main class="card bg-base-100 border border-base-300 max-w-md w-full">
  <div class="card-body items-center text-center gap-3">
    <svg width="48" height="48" viewBox="0 0 24 24" aria-hidden="true">
      <g stroke="#5a3a18" stroke-width=".8" stroke-linejoin="round" stroke-linecap="round">
        <path d="M9.5 2.8 C 6.8 5 6 10.5 7 15 C 7.6 18 9 20.4 11.4 20.9 C 12.4 21.1 13.6 20.8 14.2 19.8 C 16.4 16.4 17 11 16.2 7 C 15.6 4 13 2.6 9.5 2.8 Z" fill="#ffd33a"/>
        <path d="M12.9 19.4 C 13.2 20.6 14.3 21.1 15 20.2 C 14.7 19.6 14 19.2 13.3 19 Z" fill="#5a3a18" stroke="none"/>
        <path d="M9 3 C 8.5 1.6 9.4 0.8 10.6 1.3 C 9.7 1.9 9.9 2.7 10.5 3.2 Z" fill="#7a5a2a"/>
      </g>
      <circle cx="8.5" cy="12.4" r=".85" fill="#ff9aa2" fill-opacity=".7"/>
      <circle cx="15.1" cy="11.9" r=".85" fill="#ff9aa2" fill-opacity=".7"/>
      <circle cx="10" cy="9.4" r="1.5" fill="#fff" stroke="#5a3a18" stroke-width=".5"/>
      <circle cx="13.5" cy="9.2" r="1.5" fill="#fff" stroke="#5a3a18" stroke-width=".5"/>
      <circle cx="10.2" cy="9.6" r=".72" fill="#1a1a1a"/>
      <circle cx="13.7" cy="9.4" r=".72" fill="#1a1a1a"/>
      <path d="M8.6 12.6 C 10.7 13.3 12.9 13.3 14.8 12.6 C 14.6 15.6 13 17 11.7 17 C 10.4 17 8.9 15.5 8.6 12.6 Z" fill="#5a2a2a" stroke="#5a3a18" stroke-width=".5"/>
      <path d="M10.2 14.9 C 10.2 14.2 13.2 14.2 13.2 14.9 C 13.2 16.4 12.4 17 11.7 17 C 11 17 10.2 16.4 10.2 14.9 Z" fill="#ff8a8a"/>
    </svg>
    <div class="text-5xl font-semibold tracking-tight leading-none">{{ .Status }}</div>
    <h1 class="text-xl font-semibold">{{ .Title }}</h1>
    <p class="text-base-content/70">{{ .Tagline }}</p>
    <a href="/" class="btn btn-primary mt-2">Take me home</a>
  </div>
</main>
</body>
</html>
