{{ define "head" -}}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: light; }
  body { font-family: system-ui, sans-serif; max-width: 60rem; margin: 3rem auto; padding: 0 1.25rem; color: #111; line-height: 1.5; }
  body.narrow { max-width: 38rem; }
  h1 { margin-top: 0; }
  a { color: #111; }
  a:hover { text-decoration: none; }
  p { margin: 0.75rem 0; }

  label { display: block; font-weight: 600; margin: 1rem 0 0.25rem; }
  label .hint { font-weight: 400; color: #888; font-size: 0.9em; }
  input, select, textarea { width: 100%; padding: 0.6rem; font: inherit; border: 1px solid #bbb; border-radius: 6px; box-sizing: border-box; background: #fff; }
  textarea { font-family: inherit; resize: vertical; }
  button { margin-top: 1rem; padding: 0.7rem 1.4rem; font: inherit; background: #111; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
  button:hover { background: #333; }

  .row { margin: 1rem 0; }
  .desc { color: #666; font-size: 0.9rem; margin-top: 0.25rem; min-height: 1.2em; }
  .muted { color: #666; }
  .error { color: #c00; }

  ul.list { list-style: none; padding: 0; }
  ul.list li { padding: 0.5rem 0; border-bottom: 1px solid #eee; }

  iframe { width: 100%; height: 60vh; border: 1px solid #ccc; border-radius: 6px; background: #fff; }

  #sel-preview { padding: 0.5rem; background: #f5f5f5; border-radius: 6px; min-height: 1.5em; font-style: italic; color: #666; }
</style>
{{- end }}
