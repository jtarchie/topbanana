<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
<title>Building your app — BuildABear</title>
{{ template "head" . }}
</head>
<body class="min-h-screen flex flex-col bg-base-100">
{{ template "brand" . }}
<main class="flex-1 max-w-2xl w-full mx-auto px-4 sm:px-6 py-10">
  <h1 class="text-3xl font-bold mb-2">Building your app</h1>
  <p class="text-base-content/70 mb-6" id="status">Just getting started…</p>

  <ul class="steps steps-vertical sm:steps-horizontal w-full mb-6" id="steps">
    <li class="step step-primary" data-step="start">Starting</li>
    <li class="step" data-step="design">Designing pages</li>
    <li class="step" data-step="polish">Polishing</li>
    <li class="step" data-step="done">Ready</li>
  </ul>

  <div class="card bg-base-200">
    <div class="card-body p-4 sm:p-6">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-base-content/60 mb-2">What I'm doing right now</h2>
      <ul id="log" class="space-y-1 text-base"></ul>
      <div id="error" class="alert alert-error mt-4 hidden" role="alert">
        <span id="error-msg"></span>
      </div>
    </div>
  </div>

  <p class="text-center text-sm text-base-content/60 mt-6">I'll bring you to your finished site as soon as it's ready.</p>
</main>
{{ template "footer" . }}

<script>
  (function () {
    var slug = '{{ .Slug }}';
    var siteURL = '{{ .SiteURL }}';
    var statusEl = document.getElementById('status');
    var logEl = document.getElementById('log');
    var errorEl = document.getElementById('error');
    var errorMsgEl = document.getElementById('error-msg');
    var stepsEl = document.getElementById('steps');

    // Step state machine: which step is currently active, and which are done.
    var stepOrder = ['start', 'design', 'polish', 'done'];
    function setStep(name) {
      var idx = stepOrder.indexOf(name);
      if (idx < 0) return;
      stepOrder.forEach(function (s, i) {
        var li = stepsEl.querySelector('[data-step="' + s + '"]');
        if (!li) return;
        li.classList.toggle('step-primary', i <= idx);
      });
    }

    // Tracks in-flight tool list items so done/error events can update the same row.
    var pendingItems = new Map();
    // Defense in depth: SSE dedupe by content+timestamp.
    var seen = new Set();
    function evKey(ev) {
      return [ev.type || '', ev.status || '', ev.tool || '', ev.phase || '',
              ev.path || '', ev.time || '', ev.message || ''].join('|');
    }

    // Translate raw tool events into plain-English sentences. Reading and
    // listing are suppressed when they succeed — too noisy and the user
    // doesn't care that we looked at a file.
    function friendlyToolStart(ev) {
      var name = filenameOf(ev.path);
      switch (ev.tool) {
        case 'write_file':
          if (ev.path === '/index.html' || ev.path === 'index.html') return 'Designing your home page…';
          return 'Adding the ' + (name || 'page') + '…';
        case 'edit_file':         return 'Updating ' + (name || 'the page') + '…';
        case 'replace_lines':
        case 'insert_at_line':    return 'Fine-tuning ' + (name || 'the page') + '…';
        case 'write_function':    return 'Adding behind-the-scenes logic for ' + (name || 'this site') + '…';
        case 'edit_function':     return 'Updating ' + (name || 'the logic') + '…';
        case 'delete_function':   return 'Removing some behind-the-scenes logic…';
        case 'fetch_reference':   return 'Reading the page you linked…';
        case 'read_attachment':   return 'Reading your reference doc…';
        case 'read_file':
        case 'list_files':
        case 'grep_files':
        case 'list_assets':
        case 'read_function':
        case 'list_functions':    return null; // suppress
        default:                  return 'Working on it…';
      }
    }
    function friendlyToolDone(ev) {
      var name = filenameOf(ev.path);
      switch (ev.tool) {
        case 'write_file':
          if (ev.path === '/index.html' || ev.path === 'index.html') return '✓ Home page ready';
          return '✓ ' + (name || 'Page') + ' ready';
        case 'edit_file':         return '✓ Updated ' + (name || 'the page');
        case 'replace_lines':
        case 'insert_at_line':    return '✓ Polished ' + (name || 'the page');
        case 'write_function':    return '✓ Added new logic';
        case 'edit_function':     return '✓ Logic updated';
        case 'delete_function':   return '✓ Removed';
        case 'fetch_reference':   return '✓ Got it';
        case 'read_attachment':   return '✓ Read it';
        case 'read_file':
        case 'list_files':
        case 'grep_files':
        case 'list_assets':
        case 'read_function':
        case 'list_functions':    return null;
        default:                  return '✓ Done';
      }
    }
    function friendlyToolError(ev) {
      var msg = ev.message || 'something went wrong';
      return '⚠ Hit a snag: ' + msg;
    }
    function friendlyStatus(ev) {
      switch (ev.status) {
        case 'building':  return "I'm working on your site now…";
        case 'linting':   return 'Checking everything works…';
        case 'retry':     return 'Fixing a few things: ' + (ev.message || '');
        case 'completed': return 'Your site is ready!';
        case 'failed':    return 'I ran into a problem: ' + (ev.message || 'unknown error');
        case 'unknown':   return 'Nothing in progress.';
        default:          return '';
      }
    }
    function filenameOf(p) {
      if (!p) return '';
      var parts = String(p).split('/');
      return parts[parts.length - 1] || '';
    }
    function toolKey(ev) { return ev.tool + ':' + (ev.path || ''); }

    function appendLine(text, kind, key) {
      var li = document.createElement('li');
      li.className = 'flex items-start gap-2';
      if (kind === 'pending') li.classList.add('text-base-content/70');
      if (kind === 'error')   li.classList.add('text-error');
      var dot = document.createElement('span');
      dot.setAttribute('aria-hidden', 'true');
      dot.className = 'mt-1 w-2 h-2 rounded-full inline-block ' + (
        kind === 'error' ? 'bg-error' :
        kind === 'done'  ? 'bg-success' :
                           'bg-base-content/40'
      );
      var msg = document.createElement('span');
      msg.textContent = text;
      li.appendChild(dot);
      li.appendChild(msg);
      logEl.appendChild(li);
      if (key) pendingItems.set(key, { li: li, msg: msg, dot: dot });
      // Keep scroll pinned to latest entry.
      var card = logEl.closest('.card-body');
      if (card) card.scrollTop = card.scrollHeight;
    }
    function updateLine(key, text, kind) {
      var p = pendingItems.get(key);
      if (!p) { appendLine(text, kind); return; }
      p.li.classList.remove('text-base-content/70', 'text-error');
      if (kind === 'error') p.li.classList.add('text-error');
      p.msg.textContent = text;
      p.dot.className = 'mt-1 w-2 h-2 rounded-full inline-block ' + (
        kind === 'error' ? 'bg-error' :
        kind === 'done'  ? 'bg-success' :
                           'bg-base-content/40'
      );
      pendingItems.delete(key);
    }

    function handle(ev) {
      if (ev.type === 'status') {
        if (ev.status === 'building')  setStep('design');
        if (ev.status === 'linting')   setStep('polish');
        if (ev.status === 'retry')     setStep('polish');
        if (ev.status === 'completed') setStep('done');
        statusEl.textContent = friendlyStatus(ev);
        if (ev.status === 'failed') {
          errorEl.classList.remove('hidden');
          errorMsgEl.textContent = ev.message || 'Unknown error.';
        } else if (ev.status === 'linting' || ev.status === 'retry') {
          appendLine(friendlyStatus(ev), 'pending');
        }
      } else if (ev.type === 'tool') {
        if (ev.phase === 'start') {
          var msg = friendlyToolStart(ev);
          if (msg) appendLine(msg, 'pending', toolKey(ev));
        } else if (ev.phase === 'done') {
          var msg2 = friendlyToolDone(ev);
          if (msg2) updateLine(toolKey(ev), msg2, 'done');
        } else if (ev.phase === 'error') {
          updateLine(toolKey(ev), friendlyToolError(ev), 'error');
        }
      }
    }

    var es = new EventSource('/events/' + slug);
    es.onmessage = function (e) {
      var ev;
      try { ev = JSON.parse(e.data); } catch (_) { return; }
      var k = evKey(ev);
      if (seen.has(k)) return;
      seen.add(k);
      handle(ev);
      if (ev.type === 'status' && (ev.status === 'completed' || ev.status === 'failed' || ev.status === 'unknown')) {
        es.close();
        if (ev.status === 'completed') {
          setTimeout(function () { window.location.href = siteURL; }, 1200);
        }
      }
    };
    es.onerror = function () { /* browser auto-reconnects */ };
  })();
</script>
</body>
</html>
