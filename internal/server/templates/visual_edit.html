<!DOCTYPE html>
<html>
<head>
<title>Visual edit: {{.Slug}} / {{.Page}}</title>
<meta charset="utf-8">
<link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
<style>
:root{--accent:#2563eb;--accent-hover:#1d4ed8}
html,body{margin:0;padding:0;height:100%;font-family:system-ui,sans-serif}
#topbar{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border-bottom:1px solid #ddd;background:#fafafa;height:42px;box-sizing:border-box}
#topbar .wordmark{font-weight:700;font-size:13px;color:#111;text-decoration:none;letter-spacing:-0.01em}
#topbar .wordmark:hover{color:var(--accent)}
#topbar .sep{color:#ccc;margin:0 .25rem}
#topbar h1{font-size:14px;margin:0;flex:1;font-weight:600}
#topbar h1 .muted{color:#888;font-weight:normal}
#topbar button,#topbar a.btn{font:inherit;padding:.35rem .75rem;border:1px solid #ccc;background:#fff;border-radius:4px;cursor:pointer;text-decoration:none;color:inherit}
#topbar button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
#topbar button.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
#topbar button:disabled{opacity:.5;cursor:not-allowed}
#status{font-size:12px;color:#666;margin-right:.5rem}
#status.ok{color:#0a7d33}
#status.err{color:#b91c1c}
#editor-wrap{height:calc(100vh - 42px);position:relative}
#gjs{height:100%}
#ai-panel{position:absolute;top:0;right:0;width:380px;height:100%;background:#fff;border-left:1px solid #ddd;padding:1rem;box-sizing:border-box;display:none;flex-direction:column;gap:.5rem;z-index:10}
#ai-panel.open{display:flex}
#ai-panel h2{font-size:14px;margin:0}
#ai-panel textarea{min-height:100px;font:inherit;padding:.5rem;border:1px solid #ccc;border-radius:4px;resize:vertical}
#ai-panel .row{display:flex;gap:.5rem;align-items:center}
#ai-panel .selection{font-size:12px;color:#666;max-height:60px;overflow:hidden;background:#f4f4f4;padding:.4rem;border-radius:4px}
#ai-panel .selection.empty{color:#999;font-style:italic}
#ai-log{flex:1;min-height:120px;overflow-y:auto;background:#fafafa;border:1px solid #eee;border-radius:4px;padding:.4rem .6rem;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;display:none}
#ai-log.show{display:block}
#ai-log li{list-style:none;padding:.15rem 0;border-bottom:1px solid #f0f0f0;color:#444}
#ai-log li:last-child{border-bottom:0}
#ai-log li.status{color:#111;font-weight:600}
#ai-log li.tool.pending{color:#888}
#ai-log li.tool.done{color:#444}
#ai-log li.tool.error{color:#c00}
#ai-log .ts{color:#999;margin-right:.4rem}
#warnings{position:absolute;bottom:0;left:0;right:0;max-height:160px;overflow-y:auto;background:#fff8e6;border-top:1px solid #f0d77a;padding:.5rem .75rem;font-size:13px;display:none;z-index:5}
#warnings.show{display:block}
#warnings ul{margin:.25rem 0 0 1rem;padding:0}
#warnings .close{float:right;cursor:pointer;color:#666;background:none;border:none;font-size:16px}
</style>
</head>
<body>
<div id="topbar">
  <a href="/" class="wordmark">BuildABear</a>
  <span class="sep">/</span>
  <h1>Visual edit <span class="muted">— {{.Slug}} / {{.Page}}</span></h1>
  <span id="status"></span>
  <button id="refine-btn" type="button">Refine with AI</button>
  <button id="save-btn" type="button" class="primary">Save</button>
  <a class="btn" href="/edit/{{.Slug}}?page={{.Page}}">Back to editor</a>
</div>
<div id="editor-wrap">
  <div id="gjs"></div>
  <aside id="ai-panel">
    <h2>Refine with AI</h2>
    <p class="selection empty" id="ai-selection">Select a component first; its HTML will be the target.</p>
    <textarea id="ai-prompt" placeholder="e.g. make this heading bigger and centered"></textarea>
    <div class="row">
      <button id="ai-apply" type="button" class="primary">Apply</button>
      <button id="ai-cancel" type="button">Cancel</button>
      <span id="ai-status" style="font-size:12px;color:#666;margin-left:auto"></span>
    </div>
    <ul id="ai-log"></ul>
  </aside>
  <div id="warnings">
    <button class="close" id="warnings-close" type="button" aria-label="Dismiss">&times;</button>
    <strong>Lint warnings</strong>
    <ul id="warnings-list"></ul>
  </div>
</div>
<script src="https://unpkg.com/grapesjs"></script>
<script src="https://unpkg.com/grapesjs-preset-webpage"></script>
<script>
(function(){
  var slug = {{.SlugJSON}};
  var page = {{.PageJSON}};
  var initialHTML = {{.HTMLJSON}};
  var initialCSS = {{.CSSJSON}};
  var assets = {{.AssetsJSON}};

  var editor = grapesjs.init({
    container: '#gjs',
    fromElement: false,
    height: '100%',
    width: 'auto',
    storageManager: false,
    plugins: ['grapesjs-preset-webpage'],
    pluginsOpts: { 'grapesjs-preset-webpage': {} },
    assetManager: {
      assets: assets,
      upload: '/upload/' + slug,
      uploadName: 'file',
      autoAdd: true,
    },
    components: initialHTML,
    style: initialCSS,
  });

  var statusEl = document.getElementById('status');
  function setStatus(msg, cls){
    statusEl.textContent = msg || '';
    statusEl.className = cls || '';
  }

  document.getElementById('save-btn').addEventListener('click', function(){
    var btn = this;
    btn.disabled = true;
    setStatus('Saving…');
    var body = JSON.stringify({
      html: editor.getHtml(),
      css: editor.getCss(),
      page: page,
    });
    fetch('/edit/' + slug + '/visual', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: body,
    }).then(function(r){
      return r.json().then(function(j){ return {ok: r.ok, body: j}; });
    }).then(function(res){
      btn.disabled = false;
      if (!res.ok) {
        setStatus('Save failed: ' + (res.body && res.body.message || 'unknown'), 'err');
        return;
      }
      setStatus('Saved', 'ok');
      renderWarnings(res.body.warnings || []);
    }).catch(function(err){
      btn.disabled = false;
      setStatus('Save failed: ' + err, 'err');
    });
  });

  var panel = document.getElementById('ai-panel');
  var selEl = document.getElementById('ai-selection');
  document.getElementById('refine-btn').addEventListener('click', function(){
    panel.classList.add('open');
    refreshSelection();
  });
  document.getElementById('ai-cancel').addEventListener('click', function(){
    panel.classList.remove('open');
  });
  editor.on('component:selected', refreshSelection);
  function refreshSelection(){
    var sel = editor.getSelected();
    if (!sel) {
      selEl.textContent = 'Select a component first; its HTML will be the target.';
      selEl.classList.add('empty');
      return;
    }
    var h = sel.toHTML();
    selEl.textContent = h.length > 200 ? h.slice(0,200) + '…' : h;
    selEl.classList.remove('empty');
  }

  var aiStatus = document.getElementById('ai-status');
  var aiLog = document.getElementById('ai-log');
  var aiApply = document.getElementById('ai-apply');
  var pendingTools = new Map();

  function fmtTime(iso){ try { return new Date(iso).toLocaleTimeString(); } catch(_){ return ''; } }
  function toolKey(ev){ return ev.tool + ':' + (ev.path || ''); }

  function describeStatus(ev){
    switch (ev.status) {
      case 'building': return 'Agent started';
      case 'linting':  return 'Validating HTML and links…';
      case 'retry':    return 'Fixing issues: ' + (ev.message || '');
      case 'completed':return 'Done — reloading editor';
      case 'failed':   return 'Failed: ' + (ev.message || 'agent error');
      default:         return 'Status: ' + ev.status;
    }
  }
  function describeToolStart(ev){
    switch (ev.tool) {
      case 'write_file':  return '→ Writing ' + ev.path + '…';
      case 'read_file':   return '→ Reading ' + ev.path + '…';
      case 'list_files':  return '→ Listing files…';
      case 'list_assets': return '→ Checking assets…';
      default:            return '→ ' + ev.tool + '…';
    }
  }
  function describeToolDone(ev){
    switch (ev.tool) {
      case 'write_file':  return '✓ Wrote ' + ev.path;
      case 'read_file':   return '✓ Read ' + ev.path;
      case 'list_files':  return '✓ Listed files';
      case 'list_assets': return '✓ Checked assets';
      default:            return '✓ ' + ev.tool;
    }
  }
  function describeToolError(ev){
    var msg = ev.message || '';
    switch (ev.tool) {
      case 'write_file':  return '✗ Failed to write ' + ev.path + ': ' + msg;
      case 'read_file':   return '✗ Failed to read ' + ev.path + ': ' + msg;
      case 'list_files':  return '✗ Failed to list files: ' + msg;
      case 'list_assets': return '✗ Failed to check assets: ' + msg;
      default:            return '✗ ' + ev.tool + ': ' + msg;
    }
  }
  function describe(ev){
    if (ev.type === 'status') return describeStatus(ev);
    if (ev.type === 'tool') {
      if (ev.phase === 'done')  return describeToolDone(ev);
      if (ev.phase === 'error') return describeToolError(ev);
      return describeToolStart(ev);
    }
    return '';
  }

  function makeLi(ev, cls){
    var li = document.createElement('li');
    li.className = cls;
    var ts = document.createElement('span');
    ts.className = 'ts';
    ts.textContent = fmtTime(ev.time);
    var msg = document.createElement('span');
    msg.textContent = describe(ev);
    li.appendChild(ts);
    li.appendChild(msg);
    return { li: li, msg: msg };
  }

  function appendEvent(ev){
    if (ev.type !== 'tool') {
      aiLog.appendChild(makeLi(ev, ev.type).li);
    } else if (ev.phase === 'start') {
      var entry = makeLi(ev, 'tool pending');
      aiLog.appendChild(entry.li);
      pendingTools.set(toolKey(ev), entry);
    } else if (ev.phase === 'done' || ev.phase === 'error') {
      var pending = pendingTools.get(toolKey(ev));
      if (pending) {
        pending.li.className = 'tool ' + ev.phase;
        pending.msg.textContent = describe(ev);
        pendingTools.delete(toolKey(ev));
      } else {
        aiLog.appendChild(makeLi(ev, 'tool ' + ev.phase).li);
      }
    } else {
      aiLog.appendChild(makeLi(ev, 'tool done').li);
    }
    aiLog.scrollTop = aiLog.scrollHeight;
  }

  function resetLog(){
    aiLog.innerHTML = '';
    aiLog.classList.add('show');
    pendingTools = new Map();
  }

  aiApply.addEventListener('click', function(){
    var prompt = document.getElementById('ai-prompt').value.trim();
    if (!prompt) return;
    var sel = editor.getSelected();
    var selectionHTML = sel ? sel.toHTML() : '';

    aiApply.disabled = true;
    aiStatus.textContent = 'Submitting…';
    resetLog();

    var fd = new FormData();
    fd.append('page', page);
    fd.append('selection', selectionHTML);
    fd.append('prompt', prompt);
    fetch('/edit/' + slug, { method: 'POST', body: fd }).then(function(r){
      if (!r.ok) throw new Error('HTTP ' + r.status);
      aiStatus.textContent = 'Connecting…';
      subscribeToEvents();
    }).catch(function(err){
      aiApply.disabled = false;
      aiStatus.textContent = 'Failed: ' + err;
    });
  });

  function subscribeToEvents(){
    var es = new EventSource('/events/' + slug);
    es.onmessage = function(msg){
      var ev;
      try { ev = JSON.parse(msg.data); } catch(_){ return; }
      appendEvent(ev);
      aiStatus.textContent = describe(ev);
      if (ev.type === 'status' && (ev.status === 'completed' || ev.status === 'failed' || ev.status === 'unknown')) {
        es.close();
        if (ev.status === 'completed') {
          setTimeout(function(){ location.reload(); }, 600);
        } else {
          aiApply.disabled = false;
        }
      }
    };
    es.onerror = function(){
      aiStatus.textContent = 'Connection lost — retrying…';
    };
  }

  function renderWarnings(warnings){
    var box = document.getElementById('warnings');
    var list = document.getElementById('warnings-list');
    list.innerHTML = '';
    if (!warnings.length) { box.classList.remove('show'); return; }
    warnings.forEach(function(w){
      var li = document.createElement('li');
      li.textContent = w;
      list.appendChild(li);
    });
    box.classList.add('show');
  }
  document.getElementById('warnings-close').addEventListener('click', function(){
    document.getElementById('warnings').classList.remove('show');
  });
})();
</script>
</body>
</html>
