<!DOCTYPE html>
<html lang="en" data-theme="lemonade">
<head>
<title>Visual editor: {{.Slug}} / {{.Page}}</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
// Pre-paint theme bootstrap — mirrors the layout.html head partial. The
// visual editor rolls its own chrome around GrapesJS so it can't share the
// partial verbatim; keep the two in sync if either changes. Cyberpunk is
// accepted as a stored value (legacy + Theme Studio) but the auto-dark
// target is lemonade-dark, matching the rest of the app.
(function () {
  try {
    var stored = localStorage.getItem('tb_theme');
    if (stored === 'lemonade' || stored === 'lemonade-dark' || stored === 'cyberpunk') {
      document.documentElement.dataset.theme = stored;
      return;
    }
    var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (dark) document.documentElement.dataset.theme = 'lemonade-dark';
  } catch (_) {}
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Self-hosted Tailwind + daisyUI (see appCSSHandler); no CDN, no in-browser JIT. -->
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: "Inter", system-ui, -apple-system, sans-serif; }
  #editor-wrap { height: calc(100vh - 56px); position: relative; }
  #gjs { height: 100%; }
  #warnings { position: absolute; bottom: 0; left: 0; right: 0; max-height: 200px; overflow-y: auto; z-index: 5; display: none; }
  #warnings.show { display: block; }
</style>
</head>
<body class="bg-base-100">
<header class="navbar bg-base-100 border-b border-base-300 px-4" style="height:56px;min-height:56px">
  <div class="flex flex-1 min-w-0 gap-2 items-center">
    <a href="/" class="font-semibold text-base shrink-0">Top Banana</a>
    <span class="text-base-content/40 shrink-0" aria-hidden="true">/</span>
    <span class="text-sm truncate min-w-0">Visual editor — <span class="font-mono">{{.Slug}} / {{.Page}}</span></span>
  </div>
  <div class="flex-none flex items-center gap-2">
    <span id="status" class="text-xs text-base-content/60 mr-2"></span>
    <button id="images-btn" type="button" class="btn btn-ghost btn-sm">Images</button>
    <button id="save-btn" type="button" class="btn btn-primary btn-sm">Save</button>
    <a class="btn btn-ghost btn-sm" href="/edit/{{.Slug}}?page={{.Page}}">Back</a>
    {{ template "theme_toggle" . }}
  </div>
</header>
<div id="editor-wrap">
  <div id="gjs"></div>
  <div id="warnings" class="alert alert-warning rounded-none m-0">
    <div class="flex-1">
      <strong>Some warnings to look at:</strong>
      <ul id="warnings-list" class="list-disc list-inside mt-1"></ul>
    </div>
    <button class="btn btn-ghost btn-sm" id="warnings-close" type="button" aria-label="Dismiss">✕</button>
  </div>
</div>
<script src="https://unpkg.com/grapesjs"></script>
<script src="https://unpkg.com/grapesjs-preset-webpage"></script>
<script>
(function(){
  var slug = {{.SlugJSON}};
  var page = {{.PageJSON}};
  var initialHTML = {{.HTMLJSON}};
  var initialCSS = {{.CSSJSON}};
  var assets = {{.AssetsJSON}};
  var canvasCSS = {{.CanvasCSSJSON}};
  var canvasBase = {{.CanvasBaseJSON}};
  var pageTheme = {{.ThemeJSON}};

  var editor = grapesjs.init({
    container: '#gjs',
    fromElement: false,
    height: '100%',
    width: 'auto',
    storageManager: false,
    plugins: ['grapesjs-preset-webpage'],
    pluginsOpts: { 'grapesjs-preset-webpage': {} },
    assetManager: { assets: assets, upload: '/upload/' + slug, uploadName: 'file', autoAdd: true },
    // Load the site's compiled Tailwind + daisyUI sheet into the canvas iframe
    // so components render exactly as published. The canvas is a separate
    // document, so the editor page's own /app.css doesn't reach it.
    canvas: { styles: canvasCSS ? [canvasCSS] : [] },
    components: initialHTML,
    style: initialCSS,
  });
  window.editor = editor;

  // Mirror the page's data-theme onto the canvas <html> so daisyUI resolves the
  // right palette (the canvas iframe starts themeless). Also inject a
  // <base href> pointing at the site's subdomain so relative asset URLs
  // (e.g. an <img src="assets/photo.png"> the user just inserted) resolve
  // against the published origin rather than /edit/:slug/ — without this,
  // a freshly inserted image renders as a broken placeholder even though
  // editor.getHtml() (and the saved page) has the correct relative src.
  editor.on('load', function(){
    var cdoc = editor.Canvas.getDocument();
    if (!cdoc) return;
    if (cdoc.documentElement && pageTheme) cdoc.documentElement.setAttribute('data-theme', pageTheme);
    if (canvasBase && cdoc.head && !cdoc.head.querySelector('base')) {
      var base = cdoc.createElement('base');
      base.setAttribute('href', canvasBase);
      cdoc.head.insertBefore(base, cdoc.head.firstChild);
    }
  });

  var statusEl = document.getElementById('status');
  function setStatus(msg, kind){
    statusEl.textContent = msg || '';
    statusEl.className = 'text-xs mr-2 ' + (kind === 'err' ? 'text-error' : kind === 'ok' ? 'text-success' : 'text-base-content/60');
  }

  document.getElementById('save-btn').addEventListener('click', function(){
    var btn = this;
    btn.disabled = true;
    setStatus('Saving…');
    var body = JSON.stringify({ html: editor.getHtml(), css: editor.getCss(), page: page });
    fetch('/edit/' + slug + '/visual', { method: 'POST', headers: {'Content-Type':'application/json'}, body: body })
      .then(function(r){ return r.json().then(function(j){ return {ok:r.ok, body:j}; }); })
      .then(function(res){
        btn.disabled = false;
        if (!res.ok) { setStatus('Save failed: ' + (res.body && res.body.message || 'unknown'), 'err'); return; }
        setStatus('Saved', 'ok');
        renderWarnings(res.body.warnings || []);
      }).catch(function(err){ btn.disabled = false; setStatus('Save failed: ' + err, 'err'); });
  });

  function renderWarnings(warnings){
    var box = document.getElementById('warnings');
    var list = document.getElementById('warnings-list');
    list.innerHTML = '';
    if (!warnings.length) { box.classList.remove('show'); return; }
    warnings.forEach(function(w){ var li = document.createElement('li'); li.textContent = w; list.appendChild(li); });
    box.classList.add('show');
  }
  document.getElementById('warnings-close').addEventListener('click', function(){ document.getElementById('warnings').classList.remove('show'); });
})();
</script>
{{ template "image_drawer" . }}
<script>
  // Image drawer wiring for the visual editor. Insert drops a real <img>
  // component into the GrapesJS canvas next to the current selection (or at
  // the canvas root when nothing's selected). The asset's alt text is used
  // verbatim so accessibility metadata travels with the image.
  (function () {
    if (!window.TBImageDrawer || !window.editor) return;
    TBImageDrawer.init({
      slug: {{.SlugJSON}},
      mode: "insert",
      onInsert: function (asset) {
        var component = { type: 'image', attributes: { src: asset.path, alt: asset.alt || '' } };
        var sel = window.editor.getSelected();
        if (sel && sel.append) sel.append(component);
        else window.editor.addComponents(component);
      },
    });
    var btn = document.getElementById('images-btn');
    if (btn) btn.addEventListener('click', function () { TBImageDrawer.open(); });
  })();
</script>
</body>
</html>
