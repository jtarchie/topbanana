<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Top Banana mascot: a cartoony curved banana with a big smile. -->
  <g stroke="#5a3a18" stroke-width="0.8" stroke-linejoin="round" stroke-linecap="round">
    <!-- banana body: a curved crescent -->
    <path d="M9.5 2.8 C 6.8 5 6 10.5 7 15 C 7.6 18 9 20.4 11.4 20.9 C 12.4 21.1 13.6 20.8 14.2 19.8 C 16.4 16.4 17 11 16.2 7 C 15.6 4 13 2.6 9.5 2.8 Z" fill="#ffd33a"/>
    <!-- brown bottom tip -->
    <path d="M12.9 19.4 C 13.2 20.6 14.3 21.1 15 20.2 C 14.7 19.6 14 19.2 13.3 19 Z" fill="#5a3a18" stroke="none"/>
    <!-- stem -->
    <path d="M9 3 C 8.5 1.6 9.4 0.8 10.6 1.3 C 9.7 1.9 9.9 2.7 10.5 3.2 Z" fill="#7a5a2a"/>
  </g>
  <!-- cheeks -->
  <circle cx="8.5" cy="12.4" r="0.85" fill="#ff9aa2" fill-opacity="0.7"/>
  <circle cx="15.1" cy="11.9" r="0.85" fill="#ff9aa2" fill-opacity="0.7"/>
  <!-- eyes -->
  <circle cx="10" cy="9.4" r="1.5" fill="#fff" stroke="#5a3a18" stroke-width="0.5"/>
  <circle cx="13.5" cy="9.2" r="1.5" fill="#fff" stroke="#5a3a18" stroke-width="0.5"/>
  <circle cx="10.2" cy="9.6" r="0.72" fill="#1a1a1a"/>
  <circle cx="13.7" cy="9.4" r="0.72" fill="#1a1a1a"/>
  <!-- big cartoon grin -->
  <path d="M8.6 12.6 C 10.7 13.3 12.9 13.3 14.8 12.6 C 14.6 15.6 13 17 11.7 17 C 10.4 17 8.9 15.5 8.6 12.6 Z" fill="#5a2a2a" stroke="#5a3a18" stroke-width="0.5"/>
  <!-- tongue -->
  <path d="M10.2 14.9 C 10.2 14.2 13.2 14.2 13.2 14.9 C 13.2 16.4 12.4 17 11.7 17 C 11 17 10.2 16.4 10.2 14.9 Z" fill="#ff8a8a"/>
</svg>
