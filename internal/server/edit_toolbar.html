<style>
#_bab{position:fixed;bottom:1rem;right:1rem;z-index:9999;background:#fff;color:#1a1a1a;padding:.45rem .6rem;border-radius:9999px;font:14px/1.4 "Atkinson Hyperlegible",system-ui,sans-serif;box-shadow:0 6px 24px rgba(0,0,0,.15);display:flex;gap:.35rem;align-items:center;border:1px solid rgba(0,0,0,.08);transition:opacity .2s}
#_bab a,#_bab button{color:#1a1a1a;text-decoration:none;padding:.25rem .6rem;border-radius:9999px;border:0;background:transparent;font:inherit;cursor:pointer;line-height:1}
#_bab a:hover,#_bab button:hover{background:rgba(0,0,0,.05)}
#_bab .sep{color:rgba(0,0,0,.2)}
#_bab[data-hidden="true"]{opacity:.25}
#_bab[data-hidden="true"]:hover{opacity:.95}
.in-frame #_bab{display:none}
</style>
<div id="_bab" role="toolbar" aria-label="Editor toolbar">
  <a target="_top" href="{{.EditURL}}">&#x270e; Edit</a>
  <span class="sep">·</span>
  <a target="_top" href="{{.VisualURL}}">&#x270e; Visual</a>
  <span class="sep">·</span>
  <button type="button" id="_bab_hide" aria-label="Hide toolbar">Hide</button>
</div>
<script>
(function(){
  if(self!==top) document.body.classList.add('in-frame');
  var bar = document.getElementById('_bab');
  var hide = document.getElementById('_bab_hide');
  try { if (sessionStorage.getItem('_bab_hidden') === '1') bar.setAttribute('data-hidden','true'); } catch(_){}
  hide.addEventListener('click', function(){
    var hidden = bar.getAttribute('data-hidden') === 'true';
    bar.setAttribute('data-hidden', hidden ? 'false' : 'true');
    try { sessionStorage.setItem('_bab_hidden', hidden ? '0' : '1'); } catch(_){}
  });
  document.addEventListener('selectionchange', function(){
    var s = getSelection();
    if(!s || !s.rangeCount || !s.toString().trim()) return;
    var d = document.createElement('div');
    d.appendChild(s.getRangeAt(0).cloneContents());
    parent.postMessage({type:'_bab_sel', html:d.innerHTML, text:s.toString()}, '*');
  });
  window.addEventListener('message', function(e){
    if(!e.data || e.data.type !== 'buildabear:settheme') return;
    var t = e.data.theme;
    if(typeof t !== 'string' || !/^[a-z]{2,20}$/.test(t)) return;
    document.documentElement.setAttribute('data-theme', t);
  });
})();
</script>
</body>
