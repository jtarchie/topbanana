<!DOCTYPE html>
<html lang="en" data-theme="winter">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orders</title>
<link rel="stylesheet" href="/app.css">
</head>
<body class="bg-base-200 min-h-screen text-base-content">
  <div class="max-w-4xl mx-auto px-6 py-12">
    <h1 class="text-3xl font-bold tracking-tight mb-2">Orders</h1>
    <p class="mb-6"><a class="link link-primary" href="/">← back to shop</a></p>
    <div id="orders" class="card bg-base-100 shadow-xl">
      <div class="card-body">
        <p class="text-base-content/60 italic text-center py-4">Loading…</p>
      </div>
    </div>
  </div>
  <script>
    fetch('/api/orders')
      .then(function (r) { return r.json(); })
      .then(function (orders) {
        var root = document.getElementById('orders');
        if (!orders.length) {
          root.innerHTML = '<div class="card-body"><p class="text-base-content/60 italic text-center py-4">No orders yet.</p></div>';
          return;
        }
        var html = '<div class="overflow-x-auto"><table class="table"><thead><tr><th>When</th><th>Product</th><th>Qty</th><th>Name</th><th>Email</th></tr></thead><tbody></tbody></table></div>';
        root.innerHTML = html;
        var tbody = root.querySelector('tbody');
        orders.slice().reverse().forEach(function (o) {
          var tr = document.createElement('tr');
          tr.innerHTML = '<td></td><td></td><td></td><td></td><td></td>';
          var cells = tr.querySelectorAll('td');
          cells[0].textContent = o.ts ? new Date(o.ts).toLocaleString() : '';
          cells[1].textContent = o.product_name || o.product;
          cells[2].textContent = o.qty;
          cells[3].textContent = o.name;
          cells[4].textContent = o.email;
          tbody.appendChild(tr);
        });
      })
      .catch(function () { document.getElementById('orders').innerHTML = '<div class="card-body"><p class="text-base-content/60 italic text-center py-4">Could not load orders.</p></div>'; });
  </script>
</body>
</html>
