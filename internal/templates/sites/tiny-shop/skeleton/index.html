<!DOCTYPE html>
<html lang="en" data-theme="winter">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop</title>
<meta name="description" content="Browse the shop and place an order in a couple of clicks.">
<link rel="stylesheet" href="/app.css">
<script async src="https://js.stripe.com/v3/buy-button.js"></script>
</head>
<body class="bg-base-200 min-h-screen text-base-content">
  <div class="max-w-3xl mx-auto px-6 py-12">
    <h1 class="text-4xl font-bold tracking-tight">Shop</h1>
    <p class="text-base-content/70 mt-2 mb-8">Edit this copy to introduce what's for sale.</p>

    <div id="products" class="grid grid-cols-1 gap-4 mb-8">
      <p class="text-base-content/60 italic text-center py-4">loading…</p>
    </div>

    <form method="POST" action="/api/order" class="card bg-base-100 shadow-xl">
      <div class="card-body space-y-3">
        <div class="flex flex-col">
          <label class="label" for="product"><span class="text-sm font-semibold">Product</span></label>
          <select id="product" name="product" required class="select w-full"></select>
        </div>
        <div class="flex flex-col">
          <label class="label" for="qty"><span class="text-sm font-semibold">Quantity</span></label>
          <input id="qty" name="qty" type="number" min="1" value="1" required class="input w-full">
        </div>
        <div class="flex flex-col">
          <label class="label" for="name"><span class="text-sm font-semibold">Your name</span></label>
          <input id="name" name="name" type="text" autocomplete="name" required class="input w-full">
        </div>
        <div class="flex flex-col">
          <label class="label" for="email"><span class="text-sm font-semibold">Email</span></label>
          <input id="email" name="email" type="email" autocomplete="email" required class="input w-full">
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-2">Place order</button>
      </div>
    </form>

    <p class="text-center text-sm text-base-content/60 mt-4">Owner: <a class="link link-primary" href="/orders.html">view orders</a></p>
  </div>
  <script>
    var STRIPE_PUBLISHABLE_KEY = "pk_live_REPLACE_ME";

    fetch('/api/products')
      .then(function (r) { return r.json(); })
      .then(function (products) {
        var list = document.getElementById('products');
        var select = document.getElementById('product');
        var form = select.closest('form');
        list.innerHTML = '';
        select.innerHTML = '';
        products.forEach(function (p) {
          var card = document.createElement('div');
          card.className = 'card bg-base-100 shadow';
          card.innerHTML = '<div class="card-body py-4 flex flex-row items-start justify-between gap-4"><div class="flex-1"><div class="font-bold text-lg name"></div><div class="text-base-content/70 text-sm desc mt-1"></div></div><div class="font-bold text-lg price"></div></div>';
          card.querySelector('.name').textContent = p.name;
          card.querySelector('.desc').textContent = p.description || '';
          card.querySelector('.price').textContent = p.price;
          if (p.buy_button_id) {
            var buyWrap = document.createElement('div');
            buyWrap.className = 'card-body pt-0';
            var btn = document.createElement('stripe-buy-button');
            btn.setAttribute('buy-button-id', p.buy_button_id);
            btn.setAttribute('publishable-key', STRIPE_PUBLISHABLE_KEY);
            buyWrap.appendChild(btn);
            card.appendChild(buyWrap);
          } else {
            var opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.name + ' — ' + p.price;
            select.appendChild(opt);
          }
          list.appendChild(card);
        });
        if (select.options.length === 0) {
          form.style.display = 'none';
        }
      })
      .catch(function () { document.getElementById('products').textContent = 'Could not load products.'; });
  </script>
</body>
</html>
