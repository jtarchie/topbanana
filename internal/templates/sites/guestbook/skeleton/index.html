<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guestbook</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-base-200 min-h-screen text-base-content">
  <div class="max-w-2xl mx-auto px-6 py-12">
    <h1 class="text-4xl font-bold tracking-tight">Guestbook</h1>
    <p class="text-base-content/70 mt-2 mb-8">Sign in if you stopped by. The wall below is everyone who has.</p>

    <form method="POST" action="/api/sign" class="card bg-base-100 shadow-xl mb-8">
      <div class="card-body space-y-3">
        <div class="form-control">
          <label class="label" for="name"><span class="label-text font-semibold">Your name</span></label>
          <input id="name" name="name" type="text" required class="input input-bordered w-full">
        </div>
        <div class="form-control">
          <label class="label" for="message"><span class="label-text font-semibold">Message</span></label>
          <textarea id="message" name="message" required class="textarea textarea-bordered w-full min-h-24"></textarea>
        </div>
        <button type="submit" class="btn btn-primary mt-2">Sign</button>
      </div>
    </form>

    <div id="wall" class="space-y-3">
      <p class="text-base-content/60 italic">Loading…</p>
    </div>
  </div>
  <script>
    fetch('/api/list')
      .then(function (r) { return r.json(); })
      .then(function (entries) {
        var wall = document.getElementById('wall');
        wall.innerHTML = '';
        if (!entries.length) {
          wall.innerHTML = '<p class="text-base-content/60 italic">Be the first to sign.</p>';
          return;
        }
        entries.reverse().forEach(function (e) {
          var div = document.createElement('div');
          div.className = 'card bg-base-100 shadow';
          var when = e.ts ? new Date(e.ts).toLocaleString() : '';
          div.innerHTML = '<div class="card-body py-4 px-5"><div class="flex items-baseline gap-2"><span class="font-bold name"></span><span class="text-xs text-base-content/60 ts"></span></div><div class="mt-1 msg whitespace-pre-wrap"></div></div>';
          div.querySelector('.name').textContent = e.name || 'anon';
          div.querySelector('.ts').textContent = when;
          div.querySelector('.msg').textContent = e.message || '';
          wall.appendChild(div);
        });
      })
      .catch(function () {
        document.getElementById('wall').innerHTML = '<p class="text-base-content/60 italic">Could not load entries.</p>';
      });
  </script>
</body>
</html>
