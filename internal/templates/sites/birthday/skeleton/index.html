<!DOCTYPE html>
<html lang="en" data-theme="valentine">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Birthday</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary/30 via-base-100 to-accent/30 grid place-items-center px-4 py-8">
  <div class="card bg-base-100/90 backdrop-blur shadow-2xl max-w-lg w-full">
    <div class="card-body text-center">
      <p class="text-sm uppercase tracking-widest text-primary mb-2">You're invited</p>
      <h1 class="text-4xl md:text-5xl font-bold tracking-tight">Replace with the celebrant's name</h1>
      <p class="mt-4 text-xl font-semibold">Replace with the date and time</p>
      <p class="text-base-content/70">Replace with the location</p>
      <div class="card-actions justify-center mt-6">
        <a class="btn btn-primary btn-lg" href="mailto:replace@example.com?subject=RSVP">RSVP</a>
      </div>
    </div>
  </div>
</body>
</html>
