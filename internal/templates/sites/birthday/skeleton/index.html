<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Birthday</title>
<style>
  body { font-family: "Helvetica Neue", system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, #ffd86b, #ff7eb3, #8a8aff); color: #1a0033; }
  .card { background: rgba(255,255,255,0.92); padding: 3rem 2.5rem; border-radius: 18px; box-shadow: 0 12px 40px rgba(0,0,0,0.15); text-align: center; max-width: 32rem; }
  h1 { font-size: 2.5rem; margin: 0 0 0.5rem; }
  .date { font-size: 1.25rem; margin: 0.25rem 0; font-weight: 600; }
  .where { color: #444; margin: 0.25rem 0 1.5rem; }
  .rsvp { display: inline-block; padding: 0.75rem 1.5rem; background: #ff4d8a; color: #fff; text-decoration: none; border-radius: 30px; font-weight: 700; }
</style>
</head>
<body>
  <div class="card">
    <h1>Replace with the celebrant's name</h1>
    <p class="date">Replace with the date and time</p>
    <p class="where">Replace with the location</p>
    <a class="rsvp" href="mailto:replace@example.com?subject=RSVP">RSVP</a>
  </div>
</body>
</html>
