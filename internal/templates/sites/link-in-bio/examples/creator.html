<!DOCTYPE html>
<html lang="en" data-theme="valentine">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>@noelleruns</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary/30 via-base-100 to-accent/30 text-base-content flex items-center justify-center px-4 py-8">

<div class="w-full max-w-md mx-auto text-center">
  <div class="avatar mb-4 flex justify-center">
    <div class="w-28 rounded-full ring ring-primary ring-offset-base-100 ring-offset-4 bg-gradient-to-br from-primary to-accent grid place-items-center">
      <span class="text-4xl font-bold text-primary-content">N</span>
    </div>
  </div>
  <h1 class="text-3xl font-bold tracking-tight">@noelleruns</h1>
  <p class="mt-1 text-base-content/70 italic">Marathoner, run coach, oversharer about splits.</p>

  <div class="mt-3 flex flex-wrap justify-center gap-2">
    <span class="badge badge-primary">Coach</span>
    <span class="badge badge-secondary">Brooklyn</span>
    <span class="badge badge-accent">Sub-3</span>
  </div>

  <div class="mt-8 space-y-3">
    <a class="btn btn-block btn-lg bg-base-100 border border-base-300 hover:bg-base-200 normal-case justify-start gap-3" href="#">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span class="flex-1 text-left">Book a coaching session</span>
    </a>
    <a class="btn btn-block btn-lg bg-base-100 border border-base-300 hover:bg-base-200 normal-case justify-start gap-3" href="#">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-secondary"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      <span class="flex-1 text-left">Watch race-day vlog (NYC '25)</span>
    </a>
    <a class="btn btn-block btn-lg bg-base-100 border border-base-300 hover:bg-base-200 normal-case justify-start gap-3" href="#">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-accent"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span class="flex-1 text-left">Read the latest training journal</span>
    </a>
    <a class="btn btn-block btn-lg bg-base-100 border border-base-300 hover:bg-base-200 normal-case justify-start gap-3" href="#">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-info"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
      <span class="flex-1 text-left">Shop the run gear edit</span>
    </a>
    <a class="btn btn-block btn-lg bg-primary text-primary-content hover:bg-primary-focus normal-case justify-start gap-3" href="#">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <span class="flex-1 text-left">Join the Sunday long-run newsletter</span>
    </a>
  </div>

  <div class="mt-10 flex justify-center gap-4 text-base-content/60">
    <a class="hover:text-primary" href="#" aria-label="Instagram">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
    </a>
    <a class="hover:text-primary" href="#" aria-label="TikTok">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.8 20.1a6.34 6.34 0 0 0 10.86-4.43V8.93a8.16 8.16 0 0 0 4.77 1.52V7a4.85 4.85 0 0 1-1.84-.31z"/></svg>
    </a>
    <a class="hover:text-primary" href="#" aria-label="YouTube">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/></svg>
    </a>
  </div>

  <footer class="mt-10 text-sm text-base-content/60">noelleruns.example · made with care</footer>
</div>

</body>
</html>
