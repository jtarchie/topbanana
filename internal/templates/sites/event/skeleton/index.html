<!DOCTYPE html>
<html lang="en" data-theme="autumn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>You're invited</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen grid place-items-center bg-base-200 px-4 py-12">
  <div class="card bg-base-100 shadow-2xl max-w-xl w-full">
    <div class="card-body text-center px-8 py-12">
      <p class="text-xs uppercase tracking-widest text-primary">You're invited</p>
      <h1 class="mt-3 text-4xl md:text-5xl font-bold tracking-tight">Replace with the event title</h1>
      <p class="mt-2 italic text-base-content/70">Replace with a short theme line</p>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-8 text-left">
        <div>
          <p class="text-xs uppercase tracking-widest text-primary font-semibold">When</p>
          <p class="mt-1 text-lg">Replace with the date and time</p>
        </div>
        <div>
          <p class="text-xs uppercase tracking-widest text-primary font-semibold">Where</p>
          <p class="mt-1 text-lg">Replace with the venue or address</p>
        </div>
      </div>

      <p class="mt-8 text-base-content/80 leading-relaxed">Replace with a short description of the event — what to expect, who should come, what to bring.</p>

      <div class="card-actions justify-center mt-8">
        <a class="btn btn-primary btn-lg" href="mailto:replace@example.com?subject=RSVP">RSVP</a>
      </div>
    </div>
  </div>
</body>
</html>
