<!DOCTYPE html>
<html lang="en" data-theme="lemonade">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Share a photo</title>
<meta name="description" content="Scan, snap, and share a photo to the event wall. Your photo appears once the host approves it.">
<link rel="stylesheet" href="/app.css">
<style>
  /* Tap-to-choose photo control. A transparent file input fills the whole
     dropzone so the picker opens from anywhere in the area and the browser's
     required-field validation bubble anchors to the visible zone. */
  .photo-drop{
    position:relative;
    display:flex; flex-direction:column; align-items:center; gap:.75rem;
    text-align:center; cursor:pointer;
    min-height:13.5rem; padding:2rem 1.25rem;
    border:2px dashed color-mix(in oklch, var(--color-base-content) 22%, transparent);
    border-radius:1rem;
    background:color-mix(in oklch, var(--color-primary) 5%, var(--color-base-100));
    color:var(--color-base-content);
    transition:border-color .18s ease, background-color .18s ease, box-shadow .18s ease;
  }
  .photo-drop__input{
    position:absolute; inset:0; width:100%; height:100%;
    opacity:0; cursor:pointer;
  }
  .photo-drop:hover{
    border-color:var(--color-primary);
    background:color-mix(in oklch, var(--color-primary) 10%, var(--color-base-100));
  }
  .photo-drop:focus-within{
    border-color:var(--color-primary);
    background:color-mix(in oklch, var(--color-primary) 10%, var(--color-base-100));
    box-shadow:0 0 0 3px color-mix(in oklch, var(--color-base-content) 28%, transparent);
  }
  .photo-drop.is-selected{
    border-style:solid; border-color:var(--color-primary);
    background:var(--color-base-100);
  }
  .photo-drop__media{
    display:grid; place-items:center;
    width:4.5rem; height:4.5rem; border-radius:1rem; overflow:hidden;
    background:color-mix(in oklch, var(--color-primary) 22%, var(--color-base-100));
    color:var(--color-primary-content);
  }
  .photo-drop__icon{ width:2rem; height:2rem; }
  .photo-drop__thumb{ width:100%; height:100%; object-fit:cover; }
  .photo-drop__title{ font-weight:600; font-size:1rem; }
  .photo-drop__hint{
    font-size:.8125rem; line-height:1.3; max-width:24ch;
    color:color-mix(in oklch, var(--color-base-content) 70%, transparent);
    overflow-wrap:anywhere;
  }
  .photo-drop.is-selected .photo-drop__icon{ display:none; }
  @media (prefers-reduced-motion: reduce){ .photo-drop{ transition:none; } }
</style>
</head>
<body class="bg-base-200 min-h-screen text-base-content">
  <main class="max-w-md mx-auto px-6 py-12">
    <h1 class="text-4xl font-bold tracking-tight">Share a photo</h1>
    <p class="text-base-content/70 mt-2 mb-8">Scan, snap, and upload. Your photo joins the wall once the host approves it.</p>

    <div id="thanks" class="alert alert-success mb-6 hidden" role="status">
      <span>Thanks! Your photo was sent and will appear on the wall once the host approves it.</span>
    </div>

    <form method="POST" action="/_photos" enctype="multipart/form-data" class="card bg-base-100 shadow-xl">
      <div class="card-body gap-5">
        <label for="photo" class="photo-drop">
          <input id="photo" name="photo" type="file" accept="image/*" required class="photo-drop__input">
          <span class="photo-drop__media">
            <svg class="photo-drop__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M14.5 4h-5L8 6H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-4l-1.5-2Z"/>
              <circle cx="12" cy="13.5" r="3.5"/>
            </svg>
            <img class="photo-drop__thumb" alt="" hidden>
          </span>
          <span class="photo-drop__title" id="drop-title">Add a photo</span>
          <span class="photo-drop__hint" id="drop-hint">Take one now, or choose from your library</span>
        </label>
        <button type="submit" class="btn btn-primary btn-lg">Upload photo</button>
        <p class="text-center text-xs text-base-content/70">JPEG, PNG, GIF, or WebP · one photo at a time</p>
      </div>
    </form>
  </main>
  <script>
    // Show the thank-you banner after the server redirects back with ?submitted=1.
    if (new URLSearchParams(window.location.search).has('submitted')) {
      document.getElementById('thanks').classList.remove('hidden');
    }

    // Preview the chosen photo: swap the camera icon for a thumbnail and show
    // the filename, so the guest sees their pick before uploading.
    (function () {
      var input = document.getElementById('photo');
      if (!input) { return; }
      var drop = input.closest('.photo-drop');
      var thumb = drop.querySelector('.photo-drop__thumb');
      var title = document.getElementById('drop-title');
      var hint = document.getElementById('drop-hint');
      var lastURL;
      input.addEventListener('change', function () {
        var file = input.files && input.files[0];
        if (!file) { return; }
        if (lastURL) { URL.revokeObjectURL(lastURL); }
        lastURL = URL.createObjectURL(file);
        thumb.src = lastURL;
        thumb.hidden = false;
        drop.classList.add('is-selected');
        title.textContent = 'Photo ready';
        hint.textContent = file.name;
      });
    })();
  </script>
</body>
</html>
