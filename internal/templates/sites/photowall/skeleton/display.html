<!DOCTYPE html>
<html lang="en" data-theme="black">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photo wall display</title>
<meta name="description" content="Full-screen rotating wall of approved event photos. Open this page full-screen on the big display.">
<link rel="stylesheet" href="/app.css">
<style>
  html, body { height: 100%; margin: 0; background: #000; }
  #stage { position: fixed; inset: 0; overflow: hidden; }
  #stage img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; opacity: 0; transition: opacity 1s ease-in-out;
  }
  #stage img.show { opacity: 1; }
  #waiting { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #qr {
    position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 10;
    display: flex; align-items: center; gap: 0.75rem;
    background: rgba(255,255,255,0.95); padding: 0.75rem 1rem;
    border-radius: 0.75rem; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #qr img { width: 7rem; height: 7rem; display: block; }
  #qr .label { max-width: 8rem; color: #111; font-weight: 600; line-height: 1.2; }
</style>
</head>
<body class="bg-black text-base-content">
  <div id="stage" aria-live="off"></div>
  <div id="waiting" class="text-center px-6">
    <div>
      <h1 class="text-3xl font-semibold text-white/90">Waiting for photos…</h1>
      <p class="text-white/50 mt-2">Scan the code to add the first one.</p>
    </div>
  </div>
  <aside id="qr">
    <img src="/_photos/qr" alt="QR code — scan to upload a photo">
    <div class="label">Scan to add your photo</div>
  </aside>
  <script>
    (function () {
      var POLL_MS = 5000;    // how often to check for newly-approved photos
      var ROTATE_MS = 6000;  // how long each photo stays on screen
      var stage = document.getElementById('stage');
      var waiting = document.getElementById('waiting');
      var urls = [];
      var index = 0;
      var frontImg = null;

      function poll() {
        fetch('/_photos/approved', { headers: { 'Accept': 'application/json' } })
          .then(function (r) { return r.ok ? r.json() : []; })
          .then(function (list) {
            urls = (list || []).map(function (p) { return p.url; });
            waiting.style.display = urls.length ? 'none' : 'flex';
          })
          .catch(function () { /* keep showing what we have */ });
      }

      function show(url) {
        var img = document.createElement('img');
        img.src = url;
        stage.appendChild(img);
        requestAnimationFrame(function () { img.classList.add('show'); });
        var old = frontImg;
        frontImg = img;
        if (old) {
          old.classList.remove('show');
          setTimeout(function () { if (old.parentNode) { old.parentNode.removeChild(old); } }, 1200);
        }
      }

      function rotate() {
        if (!urls.length) { return; }
        if (index >= urls.length) { index = 0; }
        show(urls[index]);
        index++;
      }

      poll();
      setInterval(poll, POLL_MS);
      setInterval(rotate, ROTATE_MS);
    })();
  </script>
</body>
</html>
