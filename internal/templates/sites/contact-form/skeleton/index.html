<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sign up</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #fafafa; color: #111; }
  .card { max-width: 32rem; width: 100%; padding: 2.5rem; background: #fff; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.06); }
  h1 { margin: 0 0 0.5rem; font-size: 1.75rem; }
  p { color: #555; margin: 0 0 1.5rem; }
  label { display: block; font-weight: 600; margin: 1rem 0 0.25rem; }
  input, select, textarea { width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
  button { margin-top: 1.5rem; width: 100%; padding: 0.85rem; background: #111; color: #fff; border: 0; border-radius: 6px; font-size: 1rem; cursor: pointer; }
  button:hover { background: #222; }
  .count { margin-top: 1rem; color: #888; font-size: 0.9rem; text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <h1>Sign up</h1>
    <p>Replace this copy to describe what visitors are signing up for.</p>
    <form method="POST" action="/api/submit">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" required>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required>
      <button type="submit">Send</button>
    </form>
    <p class="count"><span id="count">…</span> submissions so far</p>
  </div>
  <script>
    fetch('/api/count')
      .then(function (r) { return r.json(); })
      .then(function (j) { document.getElementById('count').textContent = j.count; })
      .catch(function () { document.getElementById('count').textContent = '–'; });
  </script>
</body>
</html>
