<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign up</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen grid place-items-center bg-base-200 px-4 py-8">
  <div class="card bg-base-100 shadow-xl max-w-lg w-full">
    <div class="card-body">
      <h1 class="card-title text-3xl">Sign up</h1>
      <p class="text-base-content/70 mb-4">Replace this copy to describe what visitors are signing up for.</p>
      <form method="POST" action="/api/submit" class="space-y-4">
        <div class="form-control">
          <label class="label" for="name"><span class="label-text font-semibold">Name</span></label>
          <input id="name" name="name" type="text" required class="input input-bordered w-full">
        </div>
        <div class="form-control">
          <label class="label" for="email"><span class="label-text font-semibold">Email</span></label>
          <input id="email" name="email" type="email" required class="input input-bordered w-full">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Send</button>
      </form>
      <p class="text-center text-sm text-base-content/60 mt-4"><span id="count">…</span> submissions so far</p>
    </div>
  </div>
  <script>
    fetch('/api/count')
      .then(function (r) { return r.json(); })
      .then(function (j) { document.getElementById('count').textContent = j.count; })
      .catch(function () { document.getElementById('count').textContent = '–'; });
  </script>
</body>
</html>
