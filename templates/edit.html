<!DOCTYPE html>
<html>
<head>
<title>Edit: {{.Slug}}</title>
{{ template "head" . }}
</head>
<body>
	<h1>Edit: {{.Slug}}</h1>
	<p><a href="http://{{.Slug}}.{{.Domain}}:{{.Port}}/" target="_blank">View live site</a> | <a href="/apps">All apps</a></p>

	{{if .Page}}
		<div class="row">
			<label for="page-select">Page</label>
			<select id="page-select" onchange="location='/edit/{{.Slug}}?page='+encodeURIComponent(this.value)">
				{{range .Pages}}<option value="{{.}}" {{if eq . $.Page}}selected{{end}}>{{.}}</option>{{end}}
			</select>
			<p class="desc"><a href="/edit/{{.Slug}}">Edit whole site instead</a></p>
		</div>
		<iframe src="http://{{.Slug}}.{{.Domain}}:{{.Port}}/{{.Page}}" id="preview"></iframe>
		<div class="row">
			<strong>Selection</strong>
			<div id="sel-preview">(select text in the preview above to target a specific section)</div>
		</div>
	{{else}}
		<p class="muted">Editing the whole site. Your prompt will apply across all pages.</p>
	{{end}}

	<form method="POST" action="/edit/{{.Slug}}">
		<input type="hidden" name="page" value="{{.Page}}">
		<input type="hidden" name="selection" id="selection" value="">
		<div class="row">
			<label for="prompt">Prompt</label>
			<textarea name="prompt" id="prompt" rows="5" placeholder="Describe the change you want..." required></textarea>
		</div>
		<button type="submit">Apply edit</button>
	</form>

	<script>
		window.addEventListener('message', function(e) {
			if (!e.data || e.data.type !== '_bab_sel') return;
			document.getElementById('selection').value = e.data.html;
			var t = e.data.text;
			document.getElementById('sel-preview').textContent =
				'Selected: "' + t.slice(0, 120) + (t.length > 120 ? '…' : '') + '"';
		});
	</script>
</body>
</html>
