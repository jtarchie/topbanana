<!DOCTYPE html>
<html>
<head>
	<title>Edit: {{.Slug}}</title>
	<style>
		body{font:14px/1.5 sans-serif;max-width:1100px;margin:1rem auto;padding:0 1rem}
		iframe{width:100%;height:60vh;border:1px solid #ccc;border-radius:4px;background:#fff}
		textarea,select,input[type=text]{width:100%;padding:.5rem;font:inherit;box-sizing:border-box}
		#sel-preview{padding:.5rem;background:#f5f5f5;border-radius:4px;min-height:1.5em;font-style:italic;color:#666}
		.row{margin:1rem 0}
		button{padding:.5rem 1rem;font:inherit;cursor:pointer}
	</style>
</head>
<body>
	<h1>Edit: {{.Slug}}</h1>
	<p><a href="http://{{.Slug}}.{{.Domain}}:{{.Port}}/" target="_blank">View live site</a> | <a href="/apps">All apps</a></p>

	{{if .Page}}
		<div class="row">
			<label>Page: <select onchange="location='/edit/{{.Slug}}?page='+encodeURIComponent(this.value)">
				{{range .Pages}}<option value="{{.}}" {{if eq . $.Page}}selected{{end}}>{{.}}</option>{{end}}
			</select></label>
			| <a href="/edit/{{.Slug}}">Edit whole site instead</a>
		</div>
		<iframe src="http://{{.Slug}}.{{.Domain}}:{{.Port}}/{{.Page}}" id="preview"></iframe>
		<div class="row">
			<strong>Selection:</strong>
			<div id="sel-preview">(select text in the preview above to target a specific section)</div>
		</div>
	{{else}}
		<p>Editing the whole site. Your prompt will apply across all pages.</p>
	{{end}}

	<form method="POST" action="/edit/{{.Slug}}">
		<input type="hidden" name="page" value="{{.Page}}">
		<input type="hidden" name="selection" id="selection" value="">
		<div class="row">
			<textarea name="prompt" rows="5" placeholder="Describe the change you want..." required></textarea>
		</div>
		<button type="submit">Apply edit</button>
	</form>

	<script>
		window.addEventListener('message', function(e) {
			if (!e.data || e.data.type !== '_bab_sel') return;
			document.getElementById('selection').value = e.data.html;
			var t = e.data.text;
			document.getElementById('sel-preview').textContent =
				'Selected: "' + t.slice(0, 120) + (t.length > 120 ? '…' : '') + '"';
		});
	</script>
</body>
</html>
