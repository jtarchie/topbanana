<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Coming soon</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #fafafa; color: #111; }
  .card { max-width: 28rem; padding: 2.5rem; background: #fff; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.06); text-align: center; }
  h1 { margin: 0 0 0.5rem; font-size: 1.75rem; }
  p { color: #555; margin-bottom: 1.5rem; }
  form { display: flex; gap: 0.5rem; }
  input[type="email"] { flex: 1; padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
  button { padding: 0.75rem 1.25rem; background: #111; color: #fff; border: 0; border-radius: 6px; font-size: 1rem; cursor: pointer; }
  .thanks { display: none; color: #0a7; margin-top: 1rem; }
</style>
</head>
<body>
  <div class="card">
    <h1>Coming soon</h1>
    <p>Replace this with a one-line value proposition. Drop your email to get notified.</p>
    <form onsubmit="document.getElementById('thanks').style.display='block'; this.style.display='none'; return false;">
      <input type="email" name="email" placeholder="you@example.com" required>
      <button type="submit">Notify me</button>
    </form>
    <p id="thanks" class="thanks">Thanks — we'll be in touch.</p>
  </div>
</body>
</html>
