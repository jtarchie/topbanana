<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>@yourhandle</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; background: linear-gradient(160deg, #fde6f0 0%, #e3e6ff 100%); color: #1a1a2e; display: flex; justify-content: center; padding: 3rem 1rem; box-sizing: border-box; }
  .wrap { width: 100%; max-width: 26rem; text-align: center; }
  .avatar { width: 96px; height: 96px; border-radius: 50%; margin: 0 auto 1rem; background: #1a1a2e; color: #fff; display: grid; place-items: center; font-size: 2.25rem; font-weight: 700; }
  h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
  .bio { margin: 0 0 1.75rem; color: #444; }
  a.link { display: block; padding: 0.95rem; margin: 0.6rem 0; background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; color: #1a1a2e; text-decoration: none; font-weight: 600; transition: transform 0.1s ease; }
  a.link:hover { transform: translateY(-2px); }
  footer { margin-top: 2rem; font-size: 0.85rem; color: #555; }
</style>
</head>
<body>
<div class="wrap">
  <div class="avatar">A</div>
  <h1>@yourhandle</h1>
  <p class="bio">Replace with a one-line bio about you.</p>

  <a class="link" href="#">Replace with first link</a>
  <a class="link" href="#">Replace with second link</a>
  <a class="link" href="#">Replace with third link</a>
  <a class="link" href="#">Replace with fourth link</a>

  <footer>Replace footer or remove.</footer>
</div>
</body>
</html>
