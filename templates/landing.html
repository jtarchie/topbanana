<!DOCTYPE html>
<html>
<head>
<title>Build an App</title>
{{ template "head" . }}
</head>
<body class="narrow">
<h1>Build an App</h1>
<p>Pick a starting shape and describe what you want.</p>
<form method="POST" action="/build">
  <label for="template">Site type</label>
  <select name="template" id="template">
    {{- range .Templates }}
    <option value="{{ .ID }}"{{ if eq .ID "blank" }} selected{{ end }} data-desc="{{ .Description }}">{{ .Label }}</option>
    {{- end }}
  </select>
  <p class="desc" id="template-desc"></p>

  <label for="slug">Custom URL <span class="hint">(optional)</span></label>
  <input type="text" name="slug" id="slug" pattern="[a-z0-9]([a-z0-9\-]{1,28}[a-z0-9])?" minlength="3" maxlength="30" placeholder="leave blank for a random name">
  <p class="desc">Lowercase letters, digits, and hyphens. 3–30 characters. The site will be served at <code>{slug}.{{ .Domain }}</code>.</p>

  <label for="prompt">Prompt</label>
  <textarea name="prompt" id="prompt" rows="6" placeholder="Describe the app you want to build..."></textarea>

  <label for="username">Username <span class="hint">(optional — for password protection)</span></label>
  <input type="text" name="username" id="username" autocomplete="username">

  <label for="password">Password <span class="hint">(optional)</span></label>
  <input type="password" name="password" id="password" autocomplete="new-password">

  <button type="submit">Build it</button>
</form>

<p><a href="/apps">View existing apps</a></p>

<script>
  (function () {
    var sel = document.getElementById('template');
    var desc = document.getElementById('template-desc');
    function update() {
      var opt = sel.options[sel.selectedIndex];
      desc.textContent = opt ? opt.getAttribute('data-desc') || '' : '';
    }
    sel.addEventListener('change', update);
    update();
  })();
</script>
</body>
</html>
