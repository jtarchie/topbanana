<!DOCTYPE html>
<html>
  <head>
    <title>Building App...</title>
    <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 100px auto;
      padding: 20px;
    }
    .progress-container {
      margin: 20px 0;
    }
    .progress-bar {
      width: 100%;
      height: 30px;
      background: #e0e0e0;
      border-radius: 5px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #45a049);
      width: 0%;
      animation: progress 2s infinite;
    }
    @keyframes progress {
      0% { width: 10%; }
      50% { width: 60%; }
      100% { width: 90%; }
    }
    .status-text {
      text-align: center;
      margin: 20px 0;
      font-size: 18px;
    }
    .error {
      color: #d32f2f;
      padding: 10px;
      background: #ffebee;
      border-radius: 5px;
    }
  </style>
  </head>
  <body>
    <h1>Building Your App</h1>
    <p>Please wait while we build your app...</p>
    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>
    <div class="status-text" id="status">Initializing...</div>
    <div id="error" class="error" style="display:none;"></div>

    <script>
    const slug = '{{.Slug}}';
    const domain = '{{.Domain}}';
    const port = '{{.Port}}';
    let checkCount = 0;
    const maxChecks = 180; // 3 minutes max
    
    function checkStatus() {
      fetch('/status/' + slug)
        .then(response => response.json())
        .then(data => {
          const statusEl = document.getElementById('status');
          
          if (data.status === 'completed') {
            statusEl.textContent = 'Build complete! Redirecting...';
            setTimeout(() => {
              window.location.href = 'http://' + slug + '.' + domain + ':' + port;
            }, 1000);
          } else if (data.status === 'failed') {
            statusEl.textContent = 'Build failed!';
            const errorEl = document.getElementById('error');
            errorEl.textContent = 'Error: ' + (data.error || 'Unknown error');
            errorEl.style.display = 'block';
          } else {
            statusEl.textContent = 'Building... (checking for ' + (checkCount * 2) + 's)';
            checkCount++;
            if (checkCount < maxChecks) {
              setTimeout(checkStatus, 2000);
            } else {
              statusEl.textContent = 'Build taking longer than expected...';
            }
          }
        })
        .catch(err => {
          console.error('Status check error:', err);
          checkCount++;
          if (checkCount < maxChecks) {
            setTimeout(checkStatus, 2000);
          }
        });
    }
    
    // Start checking status
    setTimeout(checkStatus, 500);
  </script>
  </body>
</html>
