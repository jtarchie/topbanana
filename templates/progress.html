<!DOCTYPE html>
<html>
<head>
<title>Building App...</title>
{{ template "head" . }}
</head>
<body class="narrow">
	<h1>Building Your App</h1>
	<p>Please wait while we build your app...</p>
	<div id="status" class="muted">Initializing...</div>
	<div id="error" class="error" style="display:none;"></div>

	<script>
		const slug = '{{.Slug}}';
		const domain = '{{.Domain}}';
		const port = '{{.Port}}';
		let checkCount = 0;
		const maxChecks = {{.MaxChecks}};
		const pollIntervalMS = {{.PollIntervalMS}};

		function checkStatus() {
			fetch('/status/' + slug)
				.then(response => response.json())
				.then(data => {
					const statusEl = document.getElementById('status');

					if (data.status === 'completed') {
						statusEl.textContent = 'Build complete! Redirecting...';
						setTimeout(() => {
							window.location.href = 'http://' + slug + '.' + domain + ':' + port;
						}, 1000);
					} else if (data.status === 'failed') {
						statusEl.textContent = 'Build failed!';
						const errorEl = document.getElementById('error');
						errorEl.textContent = 'Error: ' + (data.error || 'Unknown error');
						errorEl.style.display = 'block';
					} else {
						statusEl.textContent = 'Building... (checking for ' + (checkCount * 2) + 's)';
						checkCount++;
						if (checkCount < maxChecks) {
							setTimeout(checkStatus, pollIntervalMS);
						} else {
							statusEl.textContent = 'Build taking longer than expected...';
						}
					}
				})
				.catch(err => {
					console.error('Status check error:', err);
					checkCount++;
					if (checkCount < maxChecks) {
						setTimeout(checkStatus, pollIntervalMS);
					}
				});
		}

		// Start checking status
		setTimeout(checkStatus, 500);
	</script>
</body>
</html>
